# Configuração do Netlify para Next.js
# Documentação: https://docs.netlify.com/integrations/frameworks/nextjs/

[build]
  # Comando de build (o Netlify detecta automaticamente, mas definimos explicitamente)
  command = "npm run build"
  # O plugin Next.js do Netlify gerencia o diretório de publicação automaticamente
  # Não é necessário definir 'publish' quando usando o plugin

# Configurações do Next.js Runtime
[build.environment]
  # Versão do Node.js (recomendado: 18 ou 20)
  NODE_VERSION = "20"
  # Força o Next.js a incluir styled-jsx no bundle
  NEXT_TELEMETRY_DISABLED = "1"

# Headers de segurança e cache
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Headers para assets estáticos (cache longo)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers para imagens (cache médio)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Headers para vídeos (cache médio)
[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Headers para CSS e JS (sem cache para desenvolvimento, cache para produção)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Configurações de plugins
# O plugin Next.js do Netlify gerencia automaticamente:
# - Build e publicação
# - Redirecionamentos do App Router
# - Serverless Functions
# - Otimizações de cache
[[plugins]]
  package = "@netlify/plugin-nextjs"

